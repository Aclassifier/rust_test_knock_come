name: Deploy Documentation to GitHub Pages

on:
  push:
    branches: [ "master" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Generate Rustdoc
        run: cargo doc --no-deps

      - name: Prepare combined site folder
        run: |
          # Create a temporary staging folder
          mkdir _site
          # Copy the generated Rust documentation into it
          cp -r target/doc/* _site/
          # Copy your README.md into it so GitHub can render it as the home page
          cp README.md _site/index.md
          # Prevent Jekyll from blocking files with underscores
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
