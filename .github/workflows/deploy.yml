name: Deploy Documentation to GitHub Pages

on:
  push:
    branches: [ "master" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Generate Rustdoc
        run: cargo doc --no-deps

      - name: Fix GitHub Pages underscore bug (Jekyll)
        run: touch target/doc/.nojekyll

      - name: Create Automatic Redirect Root Homepage
        run: |
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0; url=./rust_test_knock_come/index.html" /><script>window.location.replace("./rust_test_knock_come/index.html")</script></head><body><a href="./rust_test_knock_come/index.html">Redirecting to documentation...</a></body></html>' > target/doc/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
